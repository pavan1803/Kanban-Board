<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

#container {
  font-family: 'DM Mono', monospace;
  background: #0f0f0f;
  min-height: 100vh;
  padding: 2rem;
  display: grid;
  grid-template-rows: auto auto auto 1fr;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1rem 1.2rem;
  grid-template-areas:
    "title    title    title"
    "input    input    input"
    "btn      btn      btn"
    "todo     progress done";
}

#container h1 {
  grid-area: title;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.2rem;
  letter-spacing: 0.12em;
  color: #f0ede6;
  border-bottom: 1px solid #2e2e2e;
  padding-bottom: 0.75rem;
}

#inputText {
  grid-area: input;
  background: #1a1a1a;
  border: 1px solid #2e2e2e;
  border-radius: 6px;
  color: #f0ede6;
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  padding: 0.65rem 1rem;
  outline: none;
  transition: border-color 0.2s;
}

#inputText::placeholder { color: #555; }
#inputText:focus { border-color: #d4a84b; }

input[type="button"] {
  grid-area: btn;
  background: #d4a84b;
  color: #0f0f0f;
  border: none;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  padding: 0.6rem 1.5rem;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

input[type="button"]:hover { background: #e8bf6a; }
input[type="button"]:active { transform: scale(0.97); }

#todo, #progress, #done {
  border-radius: 8px;
  background: #161616;
  border: 1px solid #2e2e2e;
  padding: 1rem;
  min-height: 220px;
}

#todo     { border-top: 3px solid #e05c5c; }
#progress { border-top: 3px solid #d4a84b; }
#done     { border-top: 3px solid #4caf7d; }

#todo::before,
#progress::before,
#done::before {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.15em;
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid #2e2e2e;
}

#todo::before     { content: "TO DO";       color: #e05c5c; }
#progress::before { content: "IN PROGRESS"; color: #d4a84b; }
#done::before     { content: "DONE";        color: #4caf7d; }


ul.list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin: 0;
  padding: 0;
}
ul.list li {
  background: #1f1f1f;
  border: 1px solid #2e2e2e;
  border-radius: 4px;
  padding: 0.55rem 0.75rem 0.55rem 1.6rem;
  font-size: 0.78rem;
  color: #f0ede6;        /* 👈 add this line */
  cursor: grab;
  line-height: 1.4;
  position: relative;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}

.edit,
.delete {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  border: 1px solid #2e2e2e;
  background: #1a1a1a;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s, transform 0.1s, color 0.15s;
  flex-shrink: 0;
  padding: 0;
}

.edit {
  color: #4caf7d;
}

.delete {
  color: #e05c5c;
}

.edit svg,
.delete svg {
  width: 13px;
  height: 13px;
  pointer-events: none;
}

/* hover effects */
.edit:hover {
  background: #1a2e1a;
  border-color: #4caf7d;
  transform: scale(1.15);
  box-shadow: 0 0 6px rgba(76, 175, 125, 0.35);
}

.delete:hover {
  background: #2e1a1a;
  border-color: #e05c5c;
  transform: scale(1.15);
  box-shadow: 0 0 6px rgba(224, 92, 92, 0.35);
}

.edit:active,
.delete:active {
  transform: scale(0.95);
}
    </style>
</head>
<body>
    <div id="container">
        <h1>KANBAN BOARD</h1>
        <input type="text" name="input" id="inputText" placeholder="Whats in you mind??">
        <input type="button" value="SAVE" onclick="tosubmit(event)">
        <div id="todo">
            <ul class="list"></ul>
        </div>
        <div id="progress">
           <ul class="list"></ul>
        </div>
        <div id="done">
           <ul class="list"></ul>
        </div>
    </div>

    <script>
      const inputText = document.getElementById('inputText')
      const lists = document.querySelectorAll('.list')
      let dragItem = null
      const columns = document.querySelectorAll('#todo , #progress, #done')



      function tosubmit(event){
        event.preventDefault()
        if (inputText.value === ''){
          alert('Enter whats in your mind')
        }else{
          let li = document.createElement('li')
          li.setAttribute('draggable',true)


          li.innerHTML = `<span class = 'text'> ${inputText.value}</span>`
         // lists[0].appendChild(li)

          let span = document.createElement('span')
          span.innerHTML = '\u00d7'
          span.className = 'delete'
          li.appendChild(span)

          let editBtn = document.createElement('span')
          editBtn.innerHTML = "✎"
          editBtn.className = 'edit'
          li.appendChild(editBtn)
          lists[0].appendChild(li)


          li.addEventListener('dragstart',()=>{
          dragItem = li
          setTimeout(() => li.style.opacity = '0.4',0)
        })
          li.addEventListener('dragend', ()=>{
          dragItem = null
          li.style.opacity = '1'
          })
        }
         inputText.value = ''
      }
      //lists.forEach(list => {
      //list.addEventListener('dragover', (e) =>{
      //e.preventDefault()
      //})
    
      //list.addEventListener('drop',()=>{
      //if(dragItem){
        //list.appendChild(dragItem)
        //dragItem = null
      //}
    //})
  //})
        
       

   
      
      columns.forEach(column => {
      column.addEventListener('dragover',(e)=>{
        e.preventDefault()
      })
      column.addEventListener('drop',(e) => {
        e.preventDefault()
        if(dragItem){
          column.querySelector('.list').appendChild(dragItem)
          dragItem = null
        }
      })
    })
      lists.forEach(list =>{ 
        list.addEventListener('click',function(e){
  if (e.target.classList.contains('edit')) {
    editTask(e.target.parentElement)
  } 
  else if (e.target.classList.contains('delete')) {
    e.target.parentElement.remove()
  }

}, false)
})


function editTask(li) {

  let textspan = li.querySelector('.text')  // FIX: scoped to li
  if (!textspan) return

  let currentText = textspan.innerText

  let input = document.createElement('input')
  input.type = 'text'
  input.value = currentText
  input.className = 'edit-input'  // FIX: typo

  // replace text with input
  li.replaceChild(input, textspan)

  // save on Enter key
  input.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      textspan.innerText = input.value
      li.replaceChild(textspan, input)
    }
  })
  input.addEventListener('blur', function() {
    textspan.innerText = input.value
    li.replaceChild(textspan, input)
  })
}



      
    </script>
    
</body>
</html>
